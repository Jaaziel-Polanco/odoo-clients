name: ${COMPOSE_PROJECT_NAME:-odoo-greensun}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-greensun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greensun_dev}
      POSTGRES_DB: ${POSTGRES_DB:-odoo_mirror}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greensun} -d ${POSTGRES_DB:-odoo_mirror}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
